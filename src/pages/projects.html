<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Projects - Tanzeela Fatima</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .projects-header {
            background: linear-gradient(135deg, #9FC9C7, #8EB1D3);
            padding: 120px 20px 60px;
            text-align: center;
            color: #0D1B2A;
        }

        .filter-bar {
            text-align: center;
            padding: 30px 20px;
            background: #0a0a0a;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        .filter-btn {
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-btn.active,
        .filter-btn:hover {
            background: linear-gradient(135deg, #9FC9C7, #8EB1D3);
            color: #0D1B2A;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
            padding: 60px 20px;
            max-width: 1200px;
            margin: 0 auto;
            background: #000;
        }

        .no-projects {
            text-align: center;
            padding: 60px;
            color: #aaa;
        }

        @media (max-width: 768px) {
            .projects-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <header class="sticky-nav">
        <div class="sticky-nav-container">
            <div class="sticky-nav-logo">
                <i class="fa-regular fa-id-badge"></i>
                <span class="gradient-text-animated">Tanzeela Fatima</span>
            </div>
            <nav class="sticky-nav-menu">
                <ul id="navMenu">
                    <li><a href="../../index.html">Home</a></li>
                    <li><a href="../../index.html#about">About</a></li>
                    <li><a href="../../index.html#projects">Projects</a></li>
                    <li><a href="../../index.html#contact">Contact</a></li>
                </ul>
            </nav>
            <button class="sticky-nav-toggle"><i class="fas fa-bars"></i></button>
        </div>
    </header>

    <div class="projects-header">
        <h1>All Projects</h1>
        <p>Explore my complete portfolio of work</p>
    </div>

    <div class="filter-bar" id="filterBar">
        <button class="filter-btn active" data-category="all" onclick="filterProjects('all')">All Projects</button>
    </div>

    <div class="projects-grid" id="allProjectsGrid">
        <div class="text-center">Loading projects...</div>
    </div>

    <footer class="footer">
        <div class="footer-socials" id="footerSocials">
            <a href="https://github.com/" target="_blank"><i class="fab fa-github"></i></a>
            <a href="https://linkedin.com/" target="_blank"><i class="fab fa-linkedin-in"></i></a>
        </div>
        <div class="footer-bottom">
            <p id="footerText">© 2025 Tanzeela Fatima. All Rights Reserved.</p>
        </div>
    </footer>

    <script>
        const API_URL = 'http://localhost:5000/api';
        let allProjects = [];
        let categories = [];

        async function loadProjects() {
            try {
                const response = await fetch(`${API_URL}/portfolio`);
                const data = await response.json();

                allProjects = data.projects || [];
                categories = data.categories || ['Web', 'App', 'C++', 'Mini'];

                // Update navigation
                if (data.navigation) {
                    const navContainer = document.getElementById('navMenu');
                    navContainer.innerHTML = data.navigation.map(nav => `
                        <li><a class="nav-link text-white" href="${nav.link}" target="${nav.target || '_self'}">${nav.name}</a></li>
                    `).join('');
                }

                // Update footer
                if (data.footer) {
                    const footerText = document.getElementById('footerText');
                    if (footerText) footerText.innerHTML = data.footer.text || '© 2025 Tanzeela Fatima. All Rights Reserved.';

                    if (data.footer.socialLinks) {
                        const footerSocials = document.getElementById('footerSocials');
                        footerSocials.innerHTML = data.footer.socialLinks.map(link => {
                            const iconClass = link.platform === 'linkedin' ? 'fab fa-linkedin-in' :
                                link.platform === 'github' ? 'fab fa-github' :
                                    link.platform === 'twitter' ? 'fab fa-twitter' :
                                        link.platform === 'envelope' ? 'fas fa-envelope' :
                                            'fas fa-link';
                            return `<a href="${link.url}" target="_blank"><i class="${iconClass}"></i></a>`;
                        }).join('');
                    }
                }

                renderFilters();
                renderProjects(allProjects);
            } catch (error) {
                console.error('Error loading projects:', error);
                document.getElementById('allProjectsGrid').innerHTML = '<div class="no-projects">Error loading projects. Please refresh.</div>';
            }
        }

        function renderFilters() {
            const filterBar = document.getElementById('filterBar');
            let filterHtml = '<button class="filter-btn active" data-category="all" onclick="filterProjects(\'all\')">All Projects</button>';

            categories.forEach(cat => {
                filterHtml += `<button class="filter-btn" data-category="${cat}" onclick="filterProjects('${cat}')">${cat}</button>`;
            });

            filterBar.innerHTML = filterHtml;
        }

        function filterProjects(category) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            let filtered = allProjects;
            if (category !== 'all') {
                filtered = allProjects.filter(p => p.category === category);
            }

            renderProjects(filtered);
        }

        function renderProjects(projects) {
            const container = document.getElementById('allProjectsGrid');

            if (!projects || projects.length === 0) {
                container.innerHTML = '<div class="no-projects">No projects found in this category.</div>';
                return;
            }

            container.innerHTML = projects.map(p => `
                <div class="project-card">
                    ${p.image ? `<div class="project-image"><img src="${p.image}" alt="${p.title}" style="width:100%;height:200px;object-fit:cover;"></div>` : ''}
                    <div class="project-content">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                            <h3 class="project-title" style="margin: 0;">${p.title}</h3>
                            ${p.category ? `<span class="badge" style="background: linear-gradient(135deg, #9FC9C7, #8EB1D3); color: #0D1B2A; padding: 3px 10px; border-radius: 15px; font-size: 11px;">${p.category}</span>` : ''}
                        </div>
                        <p class="project-desc">${p.description}</p>
                        <div class="project-tags">
                            ${p.tags ? p.tags.split(',').map(t => `<span>${t.trim()}</span>`).join('') : ''}
                        </div>
                        ${p.demoLink ? `<a href="${p.demoLink}" target="_blank" class="project-link">View Project →</a>` : ''}
                    </div>
                </div>
            `).join('');
        }

        // Mobile menu toggle
        document.querySelector('.sticky-nav-toggle')?.addEventListener('click', () => {
            document.querySelector('.sticky-nav-menu').classList.toggle('mobile-active');
        });

        document.addEventListener('DOMContentLoaded', loadProjects);
    </script>
</body>

</html>
