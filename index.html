<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tanzeela Fatima - Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/background.css">
</head>

<body>
    <div id="animated-bg"></div>

    <header class="sticky-nav">
        <div class="sticky-nav-container">
            <div class="sticky-nav-logo">
                <i class="fa-regular fa-id-badge"></i>
                <span class="gradient-text-animated" id="siteTitle">Loading...</span>
            </div>
            <nav class="sticky-nav-menu">
                <ul id="navMenu"></ul>
            </nav>
            <button class="sticky-nav-toggle">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </header>

    <div class="container hero">
        <div class="row align-items-center">
            <div class="col-md-6">
                <div class="social-icons">
                    <a href="https://www.linkedin.com/in/tanzeela-fatima-47861b2b7/" target="_blank"><i
                            class="fab fa-linkedin"></i></a>
                    <a href="https://github.com/TanzeelaFatima492" target="_blank"><i
                            class="fa-brands fa-github"></i></a>
                    <a href="https://leetcode.com/u/TanzeelaFatima/" target="_blank" class="leetcode-icon"><img
                            src="https://leetcode.com/static/images/LeetCode_logo_rvs.png" alt="LeetCode"
                            style="width:26px;height:26px;filter:brightness(0) invert(1);" /></a>
                </div>
                <h1 id="heroTitle">Loading...</h1>
                <div class="typing-container">
                    <h3 class="typing-text" id="heroTyping">Loading...</h3>
                </div>
                <button id="cvButton" class="btn btn-custom">Download CV <i class="fa-solid fa-download"></i></button>
            </div>
            <div class="col-md-6 text-center">
                <div class="image-container">
                    <img id="profileImage" src="assets/images/profile.png" alt="Profile Image" class="profile-img">
                </div>
            </div>
        </div>
    </div>

    <section id="about" class="about-section">
        <h2>About Me</h2>
        <div id="aboutCardsContainer" class="card-container"></div>
    </section>

    <section id="Languages" class="Languages-section">
        <div class="Languages-wrap">
            <h1 class="gradient-text">My Languages</h1>
            <div id="languagesGrid" class="Languages-grid"></div>
        </div>
    </section>

    <section id="projects" class="section">
        <h2 class="section-title">Featured Projects</h2>
        <div id="projectsGrid" class="project-grid"></div>
        <div id="exploreMoreBtn" class="text-center mt-4"></div>
    </section>

    <section id="education" class="education-section">
        <div class="education-wrap">
            <h1>My Education</h1>
            <div id="educationCards" class="education-cards"></div>
        </div>
    </section>

    <section id="contact">
        <div class="contact-container">
            <div class="contact-left">
                <h2>CONTACT<br>ME</h2>
                <div class="line"></div>
                <p id="contactEmail">Loading...</p>
            </div>
            <div class="contact-right">
                <form name="contact" method="POST" data-netlify="true" id="contactForm">
                    <input type="hidden" name="form-name" value="contact">
                    <input type="text" name="name" placeholder="NAME" required>
                    <input type="email" name="email" placeholder="EMAIL" required>
                    <input type="text" name="phone" placeholder="CONTACT NO">
                    <textarea name="message" rows="4" placeholder="MESSAGE" required></textarea>
                    <div class="form-buttons">
                        <button type="reset">CANCEL</button>
                        <button type="submit">SEND</button>
                    </div>
                </form>
            </div>
        </div>
        <div class="popup" id="popupMsg">
            <h3>Message Sent!</h3>
            <p>Thank you for contacting me. I'll get back to you soon.</p>
            <button onclick="closePopup()">OK</button>
        </div>
    </section>

    <footer class="footer">
        <div class="footer-socials">
            <a href="https://www.linkedin.com/in/tanzeela-fatima-47861b2b7/" target="_blank"><i
                    class="fab fa-linkedin-in"></i></a>
            <a href="https://github.com/Fatima-progmmer" target="_blank"><i class="fab fa-github"></i></a>
            <a href="mailto:codequeen765@gmail.com" target="_blank"><i class="fas fa-envelope"></i></a>
            <a href="https://www.quora.com/profile/Tanzeela-Fatima-37" target="_blank"><i
                    class="fa-brands fa-quora"></i></a>
            <a href="https://stackoverflow.com/users/27019064/tanzeela-fatima" target="_blank"><i
                    class="fa-brands fa-stack-overflow"></i></a>
            <a href="https://codepen.io/Tanzeela_Fatima12" target="_blank"><i class="fa-brands fa-codepen"></i></a>
        </div>
        <div class="footer-bottom">
            <p id="footerText">© 2025 Tanzeela Fatima. All Rights Reserved.</p>
        </div>
    </footer>


    <script src="assets/js/script.js"></script>
    <script src="assets/js/background.js"></script>
    <script src="assets/js/api-service.js"></script>
</body>

</html>
