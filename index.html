<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tanzeela Fatima - Portfolio</title>
    <link rel="shortcut icon" href="src/images/Untitled.png "image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="src/css/style.css">
</head>

<body>
    <div id="animated-bg"></div>
    <div class="gradient-orb"></div>

    <header class="sticky-nav">
        <div class="sticky-nav-container">
            <div class="sticky-nav-logo">
                <i class="fa-regular fa-id-badge"></i>
                <span class="gradient-text-animated" id="siteTitle">Tanzeela Fatima</span>
            </div>
            <nav class="sticky-nav-menu">
                <ul id="navMenu">
                    <li><a href="#home">Home</a></li>
                    <li><a href="#about">About</a></li>
                    <li><a href="#languages">Languages</a></li>
                    <li><a href="#projects">Projects</a></li>
                    <li><a href="#education">Education</a></li>
                    <li><a href="#contact">Contact</a></li>
                </ul>
            </nav>
            <button class="sticky-nav-toggle"><i class="fas fa-bars"></i></button>
        </div>
    </header>

    <section id="home" class="hero">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-6">
                    <div class="social-icons">
                        <a href="https://www.linkedin.com/in/tanzeela-fatima-47861b2b7/" target="_blank"><i
                                class="fab fa-linkedin"></i></a>
                        <a href="https://github.com/TanzeelaFatima492" target="_blank"><i class="fab fa-github"></i></a>
                        <a href="mailto:tanzeelafatima987@gmail.com"><i class="fas fa-envelope"></i></a>
                    </div>
                    <h1 id="heroTitle">Hi, I'm <span class="gradient-text">Tanzeela</span></h1>
                    <div class="typing-container">
                        <h3 class="typing-text" id="heroTyping">Web Developer <i class="fa-solid fa-code"></i></h3>
                    </div>
                    <button id="cvButton" class="btn-custom">Download CV <i class="fa-solid fa-download"></i></button>
                </div>
                <div class="col-md-6 text-center">
                    <div class="image-container">
                        <img id="profileImage" src="src/images/profile.png" alt="Profile" class="profile-img"
                            onerror="this.src='https://via.placeholder.com/300'">
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section id="about" class="about-section">
        <h2>About Me</h2>
        <div id="aboutCardsContainer" class="card-container"></div>
    </section>

    <section id="languages" class="Languages-section">
        <div class="Languages-wrap">
            <h1 class="gradient-text">My Languages & Skills</h1>
            <div id="languagesGrid" class="Languages-grid"></div>
        </div>
    </section>

    <section id="projects" class="section">
        <h2 class="section-title">Featured Projects</h2>
        <div id="projectsGrid" class="project-grid"></div>
        <div id="exploreMoreBtn" class="text-center mt-4"></div>
    </section>

    <section id="education" class="education-section">
        <div class="education-wrap">
            <h1 class="section-title">Education</h1>
            <div id="educationCards" class="education-cards"></div>
        </div>
    </section>

    <section id="contact">
        <div class="contact-container">
            <div class="contact-left">
                <h2>CONTACT<br>ME</h2>
                <div class="line"></div>
                <p id="contactEmail">tanzeelafatima987@gmail.com</p>
                <br>
                <div class="footer-socials">
                    <a href="https://www.linkedin.com/in/tanzeela-fatima-47861b2b7/" target="_blank"><i
                            class="fab fa-linkedin-in"></i></a>
                            <a href="https://www.linkedin.com/in/tanzeela-fatima-47861b2b7/" target="_blank"><i
                            class="fab fa-linkedin-in"></i></a>
                    <a href="https://github.com/TanzeelaFatima492" target="_blank"><i class="fab fa-github"></i></a>
                    <a href="mailto:codequeen765@gmail.com"><i class="fas fa-envelope"></i></a>
                    <a href="https://github.com/TanzeelaFatima492" target="_blank"><i class="fab fa-github"></i></a>
                    <a href="mailto:codequeen765@gmail.com"><i class="fas fa-envelope"></i></a>
                    <a href="https://www.linkedin.com/in/tanzeela-fatima-47861b2b7/" target="_blank"><i class="fab fa-linkedin-in"></i></a>
                    <a href="https://github.com/TanzeelaFatima492" target="_blank"><i class="fab fa-github"></i></a>
                    <a href="mailto:codequeen765@gmail.com"><i class="fas fa-envelope"></i></a>
                </div>
                
            </div>
            <div class="contact-right">
                <form id="contactForm">
                    <input type="text" id="contactName" placeholder="NAME" required>
                    <input type="email" id="contactEmailInput" placeholder="EMAIL" required>
                    <input type="text" id="contactPhone" placeholder="PHONE">
                    <textarea id="contactMessage" rows="4" placeholder="MESSAGE" required></textarea>
                    <div class="form-buttons">
                        <button type="reset">CANCEL</button>
                        <button type="submit">SEND</button>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <footer class="footer">
        
        <div class="footer-bottom">
            <p id="footerText">© 2026 Tanzeela Fatima. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="src/js/api-service.js"></script>
    <script src="src/js/main.js"></script>
    <script src="src/js/background.js"></script>
</body>

</html>
