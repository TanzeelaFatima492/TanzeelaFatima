<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Tanzeela Fatima</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --soft-teal: #9FC9C7;
            --light-blue: #8EB1D3;
            --dark-navy: #0D1B2A;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, var(--soft-teal) 0%, var(--light-blue) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            margin: 20px;
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header i {
            font-size: 60px;
            background: linear-gradient(135deg, var(--soft-teal), var(--light-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-header h2 {
            color: var(--dark-navy);
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .input-group input {
            width: 100%;
            padding: 14px 20px 14px 45px;
            border: 2px solid #e1e1e1;
            border-radius: 12px;
            font-size: 16px;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--soft-teal);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--soft-teal), var(--light-blue));
            color: var(--dark-navy);
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(159, 201, 199, 0.3);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: var(--soft-teal);
            text-decoration: none;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid var(--dark-navy);
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <i class="fas fa-shield-alt"></i>
                <h2>Admin Login</h2>
                <p>Enter your credentials to continue</p>
            </div>
            <div id="errorMsg" class="error-message"></div>
            <div id="successMsg" class="success-message"></div>
            <form id="loginForm">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="admin@portfolio.com" value="admin@portfolio.com"
                        required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Enter password" value="admin123" required>
                </div>
                <button type="submit" class="login-btn" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>
            <div class="back-link"><a href="../index.html"><i class="fas fa-arrow-left"></i> Back to Portfolio</a></div>
        </div>
    </div>

    <script>
        // Default credentials (for localStorage fallback)
        const DEFAULT_EMAIL = "admin@portfolio.com";
        const DEFAULT_PASSWORD = "admin123";

        // Get elements
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');

        // Show error function
        function showError(message) {
            errorMsg.innerHTML = '<i class="fas fa-exclamation-triangle"></i> ' + message;
            errorMsg.style.display = 'block';
            setTimeout(() => {
                errorMsg.style.display = 'none';
            }, 4000);
        }

        // Show success function
        function showSuccess(message) {
            successMsg.innerHTML = '<i class="fas fa-check-circle"></i> ' + message;
            successMsg.style.display = 'block';
            setTimeout(() => {
                successMsg.style.display = 'none';
            }, 3000);
        }

        // Set loading state
        function setLoading(isLoading) {
            if (isLoading) {
                loginBtn.disabled = true;
                loginBtn.innerHTML = '<span class="loading-spinner"></span> Logging in...';
            } else {
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
            }
        }

        // Check if backend is available
        async function isBackendAvailable() {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 3000);
                const response = await fetch('http://localhost:5000/api/portfolio', {
                    method: 'GET',
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                return response.ok;
            } catch (error) {
                return false;
            }
        }

        // Login handler
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !password) {
                showError('Please enter both email and password');
                return;
            }

            setLoading(true);

            // Check if backend is available
            const backendAvailable = await isBackendAvailable();

            if (backendAvailable) {
                // Use Backend Authentication
                try {
                    const response = await fetch('http://localhost:5000/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });

                    const data = await response.json();

                    if (response.ok) {
                        localStorage.setItem('adminToken', data.token);
                        localStorage.setItem('adminUser', JSON.stringify(data.user));
                        sessionStorage.setItem('adminLoggedIn', 'true');
                        sessionStorage.setItem('adminLoginTime', Date.now());
                        showSuccess('Login successful! Redirecting...');
                        setTimeout(() => {
                            window.location.href = 'admin-dashboard.html';
                        }, 1000);
                    } else {
                        showError(data.message || 'Invalid credentials');
                        setLoading(false);
                    }
                } catch (error) {
                    console.error('Backend error:', error);
                    showError('Backend connection failed. Using localStorage mode.');
                    // Fallback to localStorage
                    authenticateWithLocalStorage(email, password);
                }
            } else {
                // Use localStorage Authentication (Fallback)
                console.log('Backend not available, using localStorage mode');
                authenticateWithLocalStorage(email, password);
            }
        });

        // LocalStorage authentication (fallback)
        function authenticateWithLocalStorage(email, password) {
            if (email === DEFAULT_EMAIL && password === DEFAULT_PASSWORD) {
                sessionStorage.setItem('adminLoggedIn', 'true');
                sessionStorage.setItem('adminLoginTime', Date.now());
                localStorage.setItem('useLocalStorage', 'true');
                showSuccess('Login successful (Offline Mode)! Redirecting...');
                setTimeout(() => {
                    window.location.href = 'admin-dashboard.html';
                }, 1000);
            } else {
                showError('Invalid email or password!');
                setLoading(false);
            }
        }

        // Check if already logged in
        if (sessionStorage.getItem('adminLoggedIn') === 'true') {
            const loginTime = parseInt(sessionStorage.getItem('adminLoginTime'));
            const sessionDuration = 30 * 60 * 1000; // 30 minutes

            if (Date.now() - loginTime < sessionDuration) {
                window.location.href = 'admin-dashboard.html';
            } else {
                sessionStorage.removeItem('adminLoggedIn');
                sessionStorage.removeItem('adminLoginTime');
            }
        }

        // Add Enter key support
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                loginForm.dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>

</html>
