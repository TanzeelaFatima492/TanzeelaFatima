<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Tanzeela Fatima</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .bg-circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            animation: float 20s infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }

            50% {
                transform: translateY(-100px) rotate(180deg);
            }
        }

        /* Login Card */
        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 450px;
            margin: 20px;
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header i {
            font-size: 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }

        .login-header h2 {
            font-size: 28px;
            color: #333;
            margin-bottom: 8px;
        }

        .login-header p {
            color: #666;
            font-size: 14px;
        }

        /* Form Styles */
        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            font-size: 18px;
            transition: all 0.3s;
        }

        .input-group input {
            width: 100%;
            padding: 14px 20px 14px 45px;
            border: 2px solid #e1e1e1;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
            background: white;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .input-group input.error {
            border-color: #dc3545;
            animation: shake 0.5s;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-10px);
            }

            75% {
                transform: translateX(10px);
            }
        }

        /* Password Toggle */
        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #999;
            transition: color 0.3s;
            z-index: 2;
        }

        .password-toggle:hover {
            color: #667eea;
        }

        /* Remember Me */
        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .checkbox input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .forgot-link {
            color: #667eea;
            text-decoration: none;
            transition: color 0.3s;
        }

        .forgot-link:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        /* Login Button */
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        /* Error Alert */
        .alert-message {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 10px;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-message.show {
            display: flex;
        }

        .alert-message i {
            font-size: 18px;
        }

        .alert-error {
            background: #f8d7da;
            border-left: 4px solid #dc3545;
            color: #721c24;
        }

        .alert-warning {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            color: #856404;
        }

        .alert-success {
            background: #d4edda;
            border-left: 4px solid #28a745;
            color: #155724;
        }

        /* Loading Spinner */
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Back to Site Link */
        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #666;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }

        .back-link a:hover {
            color: #667eea;
        }

        /* Security Badge */
        .security-badge {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }

        .security-badge i {
            margin: 0 3px;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: 30px 20px;
            }

            .login-header h2 {
                font-size: 24px;
            }

            .remember-forgot {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }
        }
    </style>
</head>

<body>
    <div class="bg-animation" id="bgAnimation"></div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <i class="fas fa-shield-alt"></i>
                <h2>Admin Access</h2>
                <p>Enter credentials to access dashboard</p>
            </div>

            <!-- Alert Messages -->
            <div id="errorAlert" class="alert-message alert-error">
                <i class="fas fa-exclamation-triangle"></i>
                <span id="errorText"></span>
            </div>

            <div id="warningAlert" class="alert-message alert-warning">
                <i class="fas fa-clock"></i>
                <span id="warningText"></span>
            </div>

            <form id="loginForm" autocomplete="off">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="Email Address" autocomplete="off" required>
                </div>

                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Password" autocomplete="off" required>
                    <span class="password-toggle" onclick="togglePassword()">
                        <i class="fas fa-eye-slash" id="toggleIcon"></i>
                    </span>
                </div>

                <div class="remember-forgot">
                    <label class="checkbox">
                        <input type="checkbox" id="rememberMe"> Remember me
                    </label>
                    <a href="#" class="forgot-link" onclick="showForgotPassword(event)">Forgot Password?</a>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <span id="btnText">Login</span>
                    <span id="btnLoader" style="display: none;">
                        <span class="loading-spinner"></span>
                    </span>
                </button>
            </form>

            <div class="back-link">
                <a href="index.html">
                    <i class="fas fa-arrow-left"></i> Back to Portfolio
                </a>
            </div>

            <div class="security-badge">
                <i class="fas fa-lock"></i>
                <i class="fas fa-shield-alt"></i>
            </div>
        </div>
    </div>

    <script>
        // ========== SECURE ADMIN CREDENTIALS ==========
        // In production, this should be on a backend server
        // For demo, we use hashed values (base64 encoded for basic security)

        const ADMIN_CREDENTIALS = {
            // Email: tanzeelafatima987@gmail.com
            // Password: Admin@2025!
            email: btoa("tanzeelafatima987@gmail.com"),
            password: btoa("Admin@2025!")
        };

        // Rate limiting
        let loginAttempts = 0;
        let lockoutTime = 0;
        const MAX_ATTEMPTS = 5;
        const LOCKOUT_DURATION = 15 * 60 * 1000; // 15 minutes

        // Session timeout (30 minutes)
        const SESSION_TIMEOUT = 30 * 60 * 1000;

        // Check existing session
        function checkExistingSession() {
            const session = sessionStorage.getItem('adminSession');
            const rememberSession = localStorage.getItem('rememberSession');

            if (session) {
                const sessionData = JSON.parse(session);
                if (Date.now() < sessionData.expiry) {
                    window.location.href = 'admin-dashboard.html';
                    return true;
                } else {
                    sessionStorage.removeItem('adminSession');
                }
            }

            if (rememberSession) {
                const sessionData = JSON.parse(rememberSession);
                if (Date.now() < sessionData.expiry) {
                    sessionStorage.setItem('adminSession', JSON.stringify({
                        loggedIn: true,
                        expiry: sessionData.expiry
                    }));
                    window.location.href = 'admin-dashboard.html';
                    return true;
                } else {
                    localStorage.removeItem('rememberSession');
                }
            }
            return false;
        }

        // Generate CSRF token
        function generateCSRFToken() {
            const token = Math.random().toString(36).substring(2) + Date.now().toString(36);
            sessionStorage.setItem('csrfToken', token);
            return token;
        }

        // Validate input
        function validateInput(email, password) {
            if (!email || !password) {
                showError('Please enter both email and password');
                return false;
            }

            if (!email.includes('@') || !email.includes('.')) {
                showError('Please enter a valid email address');
                return false;
            }

            if (password.length < 6) {
                showError('Password must be at least 6 characters');
                return false;
            }

            return true;
        }

        // Show error message
        function showError(message) {
            const errorAlert = document.getElementById('errorAlert');
            const errorText = document.getElementById('errorText');
            errorText.textContent = message;
            errorAlert.classList.add('show');

            // Highlight input fields
            document.getElementById('email').classList.add('error');
            document.getElementById('password').classList.add('error');

            setTimeout(() => {
                errorAlert.classList.remove('show');
                document.getElementById('email').classList.remove('error');
                document.getElementById('password').classList.remove('error');
            }, 3000);
        }

        function showWarning(message) {
            const warningAlert = document.getElementById('warningAlert');
            const warningText = document.getElementById('warningText');
            warningText.textContent = message;
            warningAlert.classList.add('show');

            setTimeout(() => {
                warningAlert.classList.remove('show');
            }, 4000);
        }

        // Check rate limiting
        function isRateLimited() {
            if (loginAttempts >= MAX_ATTEMPTS) {
                if (Date.now() < lockoutTime) {
                    const remaining = Math.ceil((lockoutTime - Date.now()) / 60000);
                    showWarning(`Too many attempts. Try again in ${remaining} minutes`);
                    return true;
                } else {
                    loginAttempts = 0;
                    lockoutTime = 0;
                }
            }
            return false;
        }

        // Login function
        async function handleLogin(e) {
            e.preventDefault();

            // Check rate limit
            if (isRateLimited()) return;

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;

            // Validate input
            if (!validateInput(email, password)) {
                loginAttempts++;
                return;
            }

            // Show loading state
            const loginBtn = document.getElementById('loginBtn');
            const btnText = document.getElementById('btnText');
            const btnLoader = document.getElementById('btnLoader');
            btnText.style.display = 'none';
            btnLoader.style.display = 'inline-block';
            loginBtn.disabled = true;

            // Simulate API call (in production, replace with actual backend)
            setTimeout(() => {
                // Verify credentials (decode from base64)
                const validEmail = atob(ADMIN_CREDENTIALS.email);
                const validPassword = atob(ADMIN_CREDENTIALS.password);

                if (email === validEmail && password === validPassword) {
                    // Login successful
                    loginAttempts = 0;

                    // Generate session
                    const sessionData = {
                        loggedIn: true,
                        email: email,
                        loginTime: Date.now(),
                        expiry: Date.now() + SESSION_TIMEOUT,
                        csrfToken: generateCSRFToken()
                    };

                    // Store session
                    sessionStorage.setItem('adminSession', JSON.stringify(sessionData));

                    if (rememberMe) {
                        localStorage.setItem('rememberSession', JSON.stringify({
                            loggedIn: true,
                            email: email,
                            expiry: Date.now() + (7 * 24 * 60 * 60 * 1000) // 7 days
                        }));
                    }

                    // Log successful attempt
                    console.log('Admin login successful at:', new Date().toISOString());

                    // Redirect to dashboard
                    window.location.href = 'admin-dashboard.html';
                } else {
                    // Login failed
                    loginAttempts++;

                    if (loginAttempts >= MAX_ATTEMPTS) {
                        lockoutTime = Date.now() + LOCKOUT_DURATION;
                        showError(`Too many failed attempts. Account locked for 15 minutes`);
                    } else {
                        const remaining = MAX_ATTEMPTS - loginAttempts;
                        showError(`Invalid credentials. ${remaining} attempts remaining`);
                    }

                    // Log failed attempt
                    console.warn('Failed login attempt from:', email, 'at:', new Date().toISOString());
                }

                // Reset button state
                btnText.style.display = 'inline';
                btnLoader.style.display = 'none';
                loginBtn.disabled = false;
            }, 800); // Simulate network delay
        }

        // Toggle password visibility
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            }
        }

        // Forgot password handler
        function showForgotPassword(e) {
            e.preventDefault();
            showWarning('Please contact system administrator at tanzeelafatima987@gmail.com');
        }

        // Create animated background
        function createBackground() {
            const bg = document.getElementById('bgAnimation');
            for (let i = 0; i < 15; i++) {
                const circle = document.createElement('div');
                const size = Math.random() * 100 + 50;
                circle.classList.add('bg-circle');
                circle.style.width = size + 'px';
                circle.style.height = size + 'px';
                circle.style.left = Math.random() * 100 + '%';
                circle.style.top = Math.random() * 100 + '%';
                circle.style.animationDelay = Math.random() * 20 + 's';
                circle.style.animationDuration = Math.random() * 15 + 10 + 's';
                bg.appendChild(circle);
            }
        }

        // Prevent back button after logout
        function preventBackNavigation() {
            window.history.pushState(null, '', window.location.href);
            window.addEventListener('popstate', function () {
                window.history.pushState(null, '', window.location.href);
            });
        }

        // Add security headers (simulated)
        function addSecurityHeaders() {
            // Disable right click
            document.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                return false;
            });

            // Disable console shortcuts
            document.addEventListener('keydown', (e) => {
                if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I') ||
                    (e.ctrlKey && e.shiftKey && e.key === 'J') || (e.ctrlKey && e.key === 'U')) {
                    e.preventDefault();
                    showWarning('Developer tools are disabled for security');
                }
            });
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            createBackground();

            // Check if already logged in
            if (checkExistingSession()) return;

            // Add event listeners
            document.getElementById('loginForm').addEventListener('submit', handleLogin);

            // Security measures
            preventBackNavigation();
            addSecurityHeaders();

            // Clear sensitive data on page unload
            window.addEventListener('beforeunload', () => {
                sessionStorage.removeItem('csrfToken');
            });
        });

        // Export functions for global use
        window.togglePassword = togglePassword;
        window.showForgotPassword = showForgotPassword;
    </script>
</body>

</html>
