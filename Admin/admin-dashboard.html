<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Tanzeela Fatima</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --soft-teal: #9FC9C7;
            --light-blue: #8EB1D3;
            --dark-navy: #0D1B2A;
            --code-teal: #2EC4B6;
            --accent-red: #E63946;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Sidebar Accordion Styles */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 320px;
            height: 100vh;
            background: linear-gradient(180deg, var(--dark-navy) 0%, #1a2a3a 100%);
            transition: all 0.3s;
            z-index: 1000;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 25px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar-header i {
            font-size: 50px;
            background: linear-gradient(135deg, var(--soft-teal), var(--light-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sidebar-header h3 {
            margin-top: 10px;
            font-size: 18px;
        }

        /* Accordion Menu */
        .accordion-item {
            background: transparent;
            border: none;
            margin: 5px 10px;
        }

        .accordion-header {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            margin-bottom: 2px;
        }

        .accordion-button {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border-radius: 10px !important;
            padding: 12px 20px;
            font-weight: 600;
        }

        .accordion-button:not(.collapsed) {
            background: linear-gradient(135deg, var(--soft-teal), var(--light-blue));
            color: var(--dark-navy);
        }

        .accordion-button:focus {
            box-shadow: none;
            border-color: transparent;
        }

        .accordion-body {
            padding: 10px 0 10px 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 0 0 10px 10px;
        }

        .section-item {
            padding: 10px 15px;
            margin: 5px 0;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(5px);
        }

        .section-item.active {
            background: linear-gradient(135deg, var(--soft-teal), var(--light-blue));
            color: var(--dark-navy);
        }

        .section-badge {
            background: var(--code-teal);
            color: var(--dark-navy);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
        }

        /* Main Content */
        .main-content {
            margin-left: 320px;
            padding: 30px;
            min-height: 100vh;
        }

        .top-bar {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logout-btn {
            background: linear-gradient(135deg, var(--accent-red), #ff6b6b);
            padding: 10px 20px;
            border-radius: 10px;
            color: white;
            border: none;
            cursor: pointer;
        }

        /* Section Editor Card */
        .section-editor-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .section-title {
            font-size: 24px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #ddd;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: white;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--soft-teal);
        }

        textarea.form-control {
            resize: vertical;
            min-height: 100px;
        }

        .image-upload-area {
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .image-upload-area:hover {
            border-color: var(--soft-teal);
            background: rgba(159, 201, 199, 0.1);
        }

        .image-preview {
            margin-top: 15px;
            text-align: center;
        }

        .image-preview img {
            max-width: 200px;
            max-height: 150px;
            border-radius: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--soft-teal), var(--light-blue));
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            color: var(--dark-navy);
            cursor: pointer;
            font-weight: 600;
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--accent-red), #ff6b6b);
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
        }

        .btn-warning {
            background: linear-gradient(135deg, #ffd89b, #ffb347);
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            color: #333;
            cursor: pointer;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
        }

        .items-list {
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
        }

        .item-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .sidebar {
                left: -320px;
            }

            .main-content {
                margin-left: 0;
            }

            .sidebar.active {
                left: 0;
            }
        }
    </style>
</head>

<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-crown"></i>
            <h3>Admin Dashboard</h3>
            <p style="font-size: 12px;">Content Management System</p>
        </div>

        <!-- Accordion Sidebar -->
        <div class="accordion" id="sidebarAccordion">
            <!-- Homepage Accordion -->
            <div class="accordion-item">
                <h2 class="accordion-header">
                    <button class="accordion-button" type="button" data-bs-toggle="collapse"
                        data-bs-target="#homepageSections">
                        <i class="fas fa-home me-2"></i> Homepage
                    </button>
                </h2>
                <div id="homepageSections" class="accordion-collapse collapse show" data-bs-parent="#sidebarAccordion">
                    <div class="accordion-body" id="homepageSectionsList"></div>
                </div>
            </div>

            <!-- Projects Page Accordion -->
            <div class="accordion-item">
                <h2 class="accordion-header">
                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                        data-bs-target="#projectsSections">
                        <i class="fas fa-project-diagram me-2"></i> Projects Page
                    </button>
                </h2>
                <div id="projectsSections" class="accordion-collapse collapse" data-bs-parent="#sidebarAccordion">
                    <div class="accordion-body" id="projectsSectionsList"></div>
                </div>
            </div>

            <!-- Footer Accordion -->
            <div class="accordion-item">
                <h2 class="accordion-header">
                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                        data-bs-target="#footerSections">
                        <i class="fas fa-copyright me-2"></i> Footer
                    </button>
                </h2>
                <div id="footerSections" class="accordion-collapse collapse" data-bs-parent="#sidebarAccordion">
                    <div class="accordion-body" id="footerSectionsList"></div>
                </div>
            </div>

            <!-- Navigation Accordion -->
            <div class="accordion-item">
                <h2 class="accordion-header">
                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                        data-bs-target="#navigationSections">
                        <i class="fas fa-bars me-2"></i> Navigation Menu
                    </button>
                </h2>
                <div id="navigationSections" class="accordion-collapse collapse" data-bs-parent="#sidebarAccordion">
                    <div class="accordion-body" id="navigationSectionsList"></div>
                </div>
            </div>

            <!-- Custom Pages Accordion -->
            <div class="accordion-item">
                <h2 class="accordion-header">
                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                        data-bs-target="#customPages">
                        <i class="fas fa-file-alt me-2"></i> Custom Pages
                    </button>
                </h2>
                <div id="customPages" class="accordion-collapse collapse" data-bs-parent="#sidebarAccordion">
                    <div class="accordion-body" id="customPagesList"></div>
                </div>
            </div>
        </div>

        <div class="p-3 mt-3">
            <button class="btn-secondary w-100 mb-2" onclick="exportData()"><i class="fas fa-download"></i> Export
                Data</button>
            <button class="btn-secondary w-100" onclick="importData()"><i class="fas fa-upload"></i> Import
                Data</button>
        </div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <button id="menuToggle" style="background: none; border: none; color: white; font-size: 24px;"><i
                    class="fas fa-bars"></i></button>
            <button class="logout-btn" onclick="logout()">Logout <i class="fas fa-sign-out-alt"></i></button>
        </div>

        <!-- Dynamic Section Editor -->
        <div id="sectionEditor" class="section-editor-card">
            <div class="section-title">
                <h2 id="editorTitle">Select a section to edit</h2>
            </div>
            <div id="editorContent">
                <p class="text-center text-muted">Click on any section from the sidebar to start editing</p>
            </div>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Edit Item</h3><button onclick="closeModal()"
                    style="background: none; border: none; color: white; font-size: 24px;">&times;</button>
            </div>
            <div id="modalBody"></div>
            <button class="btn-primary mt-3" onclick="saveModalItem()">Save</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Authentication
        if (!sessionStorage.getItem('adminLoggedIn')) {
            window.location.href = 'admin-login.html';
        }

        const API_URL = 'http://localhost:5000/api';
        const token = localStorage.getItem('adminToken');

        // Data Storage
        let portfolioData = {
            hero: {},
            aboutCards: [],
            languages: [],
            projects: [],
            education: [],
            contact: {},
            footer: {},
            navigation: [],
            settings: {},
            categories: ['Web', 'App', 'C++', 'Mini']
        };

        let currentSection = null;
        let currentPage = null;

        // Load all data from backend
        async function loadAllData() {
            try {
                const response = await fetch(`${API_URL}/portfolio`);
                portfolioData = await response.json();
                console.log('Data loaded:', portfolioData);
                renderSidebar();
            } catch (error) {
                console.error('Error loading data:', error);
                showError('Failed to load data. Make sure backend is running.');
            }
        }

        // Render Sidebar with Sections
        function renderSidebar() {
            // Homepage Sections
            const homepageContainer = document.getElementById('homepageSectionsList');
            const homepageSections = [
                { id: 'hero', name: 'Hero Section', icon: 'fa-star', type: 'hero' },
                { id: 'about', name: 'About Section', icon: 'fa-user', type: 'about' },
                { id: 'languages', name: 'Languages Section', icon: 'fa-code', type: 'languages' },
                { id: 'projects', name: 'Projects Section', icon: 'fa-project-diagram', type: 'projects' },
                { id: 'education', name: 'Education Section', icon: 'fa-graduation-cap', type: 'education' },
                { id: 'contact', name: 'Contact Section', icon: 'fa-envelope', type: 'contact' }
            ];
            homepageContainer.innerHTML = homepageSections.map(section => `
                <div class="section-item" onclick="loadSectionEditor('homepage', '${section.id}', '${section.name}', '${section.type}')">
                    <span><i class="fas ${section.icon} me-2"></i> ${section.name}</span>
                    <span class="section-badge">${section.type}</span>
                </div>
            `).join('');

            // Projects Page Sections
            const projectsContainer = document.getElementById('projectsSectionsList');
            projectsContainer.innerHTML = `
                <div class="section-item" onclick="loadProjectsManager()">
                    <span><i class="fas fa-list me-2"></i> All Projects Manager</span>
                    <span class="section-badge">CRUD</span>
                </div>
                <div class="section-item" onclick="loadCategoriesManager()">
                    <span><i class="fas fa-tags me-2"></i> Categories Manager</span>
                    <span class="section-badge">Settings</span>
                </div>
            `;

            // Footer Sections
            const footerContainer = document.getElementById('footerSectionsList');
            footerContainer.innerHTML = `
                <div class="section-item" onclick="loadSectionEditor('footer', 'footer', 'Footer Settings', 'footer')">
                    <span><i class="fas fa-copyright me-2"></i> Footer Settings</span>
                    <span class="section-badge">Edit</span>
                </div>
                <div class="section-item" onclick="loadSocialLinksEditor()">
                    <span><i class="fas fa-share-alt me-2"></i> Social Links</span>
                    <span class="section-badge">Manage</span>
                </div>
            `;

            // Navigation Sections
            const navContainer = document.getElementById('navigationSectionsList');
            navContainer.innerHTML = `
                <div class="section-item" onclick="loadNavigationEditor()">
                    <span><i class="fas fa-bars me-2"></i> Navigation Menu Items</span>
                    <span class="section-badge">CRUD</span>
                </div>
            `;

            // Custom Pages
            const customContainer = document.getElementById('customPagesList');
            if (portfolioData.customPages && portfolioData.customPages.length > 0) {
                customContainer.innerHTML = portfolioData.customPages.map((page, i) => `
                    <div class="section-item" onclick="loadCustomPageEditor(${i})">
                        <span><i class="fas fa-file me-2"></i> ${page.name}</span>
                        <span class="section-badge">Page</span>
                    </div>
                `).join('');
            } else {
                customContainer.innerHTML = `<div class="section-item" onclick="createNewPage()"><span><i class="fas fa-plus me-2"></i> Create New Page</span></div>`;
            }
        }

        // Load Section Editor
        function loadSectionEditor(page, sectionId, sectionName, sectionType) {
            currentPage = page;
            currentSection = sectionId;

            document.getElementById('editorTitle').innerHTML = `<i class="fas ${getSectionIcon(sectionType)} me-2"></i> ${sectionName}`;

            let html = '';

            if (sectionType === 'hero') {
                html = `
                    <div class="form-group">
                        <label>Profile Image</label>
                        <div class="image-upload-area" onclick="document.getElementById('heroImageInput').click()">
                            <i class="fas fa-cloud-upload-alt" style="font-size: 40px;"></i>
                            <p>Click to upload profile image</p>
                            <input type="file" id="heroImageInput" accept="image/*" style="display:none;" onchange="uploadImage(this, 'heroImage')">
                        </div>
                        <div id="heroImagePreview" class="image-preview">${portfolioData.hero?.image ? `<img src="${portfolioData.hero.image}">` : ''}</div>
                        <input type="hidden" id="heroImage" value="${portfolioData.hero?.image || ''}">
                    </div>
                    <div class="form-group"><label>Hero Title</label><input type="text" id="heroTitle" class="form-control" value="${portfolioData.hero?.title || 'Tanzeela'}"></div>
                    <div class="form-group"><label>Typing Text</label><input type="text" id="heroTypingText" class="form-control" value="${portfolioData.hero?.typingText || 'Web & C++ Dev'}"></div>
                    <div class="form-group"><label>CV Link</label><input type="text" id="heroCvLink" class="form-control" value="${portfolioData.hero?.cvLink || '#'}"></div>
                    <button class="btn-primary" onclick="saveHeroSection()">Save Changes</button>
                `;
            }
            else if (sectionType === 'about') {
                html = `
                    <div class="form-group"><label>Section Title</label><input type="text" id="aboutTitle" class="form-control" value="${portfolioData.aboutTitle || 'About Me'}"></div>
                    <div id="aboutCardsList" class="items-list"></div>
                    <button class="btn-primary mt-3" onclick="addAboutCard()">+ Add New Card</button>
                    <button class="btn-primary mt-3 ms-2" onclick="saveAboutSection()">Save All Changes</button>
                `;
                renderAboutCards();
            }
            else if (sectionType === 'languages') {
                html = `
                    <div id="languagesList" class="items-list"></div>
                    <div class="form-group mt-3"><label>Add New Language</label><div class="d-flex gap-2"><input type="text" id="newLangName" class="form-control" placeholder="Language name"><input type="number" id="newLangPercent" class="form-control" style="width:100px;" placeholder="%"><button class="btn-primary" onclick="addLanguage()">Add</button></div></div>
                    <button class="btn-primary mt-3" onclick="saveLanguagesSection()">Save All Changes</button>
                `;
                renderLanguages();
            }
            else if (sectionType === 'projects') {
                html = `
                    <div class="form-group"><label>Projects to show on Homepage</label><input type="number" id="homepageProjectCount" class="form-control" value="${portfolioData.settings?.homepageProjectsCount || 3}"><button class="btn-secondary mt-2" onclick="updateHomepageCount()">Update</button></div>
                    <div id="projectsList" class="items-list"></div>
                    <button class="btn-primary mt-3" onclick="addNewProject()">+ Add New Project</button>
                `;
                renderProjects();
            }
            else if (sectionType === 'education') {
                html = `
                    <div class="form-group"><label>Section Title</label><input type="text" id="educationTitle" class="form-control" value="${portfolioData.educationTitle || 'My Education'}"></div>
                    <div id="educationList" class="items-list"></div>
                    <button class="btn-primary mt-3" onclick="addEducationItem()">+ Add Education</button>
                    <button class="btn-primary mt-3 ms-2" onclick="saveEducationSection()">Save All Changes</button>
                `;
                renderEducation();
            }
            else if (sectionType === 'contact') {
                html = `
                    <div class="form-group"><label>Section Title</label><input type="text" id="contactTitle" class="form-control" value="${portfolioData.contact?.title || 'CONTACT ME'}"></div>
                    <div class="form-group"><label>Email Address</label><input type="email" id="contactEmail" class="form-control" value="${portfolioData.contact?.email || 'codequeen765@gmail.com'}"></div>
                    <div class="form-group"><label>Phone Number</label><input type="text" id="contactPhone" class="form-control" value="${portfolioData.contact?.phone || ''}"></div>
                    <div class="form-group"><label>Address</label><textarea id="contactAddress" class="form-control" rows="2">${portfolioData.contact?.address || ''}</textarea></div>
                    <div class="form-group"><label>Form Success Message</label><textarea id="contactMessage" class="form-control" rows="2">${portfolioData.contact?.formMessage || 'Thank you for contacting me!'}</textarea></div>
                    <button class="btn-primary" onclick="saveContactSection()">Save Changes</button>
                `;
            }
            else if (sectionType === 'footer') {
                html = `
                    <div class="form-group"><label>Footer Text</label><input type="text" id="footerText" class="form-control" value="${portfolioData.footer?.text || '© 2025 Tanzeela Fatima. All Rights Reserved.'}"></div>
                    <div class="form-group"><label>Background Color</label><input type="color" id="footerBgColor" class="form-control" style="width:80px; height:40px;" value="${portfolioData.footer?.bgColor || '#0D1B2A'}"></div>
                    <div class="form-group"><label>Text Color</label><input type="color" id="footerTextColor" class="form-control" style="width:80px; height:40px;" value="${portfolioData.footer?.textColor || '#FFFFFF'}"></div>
                    <div class="form-group"><label>Show Copyright</label><select id="footerShowCopyright" class="form-control"><option value="true" ${portfolioData.footer?.showCopyright !== false ? 'selected' : ''}>Yes</option><option value="false" ${portfolioData.footer?.showCopyright === false ? 'selected' : ''}>No</option></select></div>
                    <button class="btn-primary" onclick="saveFooterSection()">Save Changes</button>
                `;
            }

            document.getElementById('editorContent').innerHTML = html;
        }

        // Render About Cards
        function renderAboutCards() {
            const container = document.getElementById('aboutCardsList');
            if (!portfolioData.aboutCards || portfolioData.aboutCards.length === 0) {
                container.innerHTML = '<p class="text-center">No about cards. Click "Add New Card" to create one.</p>';
                return;
            }
            container.innerHTML = portfolioData.aboutCards.map((card, i) => `
                <div class="item-card">
                    <div><i class="fas ${card.icon} me-2"></i><strong>${card.title}</strong><br><small>${card.content.substring(0, 80)}...</small></div>
                    <div><button class="btn-warning btn-sm" onclick="editAboutCardModal(${i})">Edit</button><button class="btn-danger btn-sm" onclick="deleteAboutCard(${i})">Delete</button></div>
                </div>
            `).join('');
        }

        // Render Languages
        function renderLanguages() {
            const container = document.getElementById('languagesList');
            if (!portfolioData.languages || portfolioData.languages.length === 0) {
                container.innerHTML = '<p class="text-center">No languages. Add your first language.</p>';
                return;
            }
            container.innerHTML = portfolioData.languages.map((lang, i) => `
                <div class="item-card">
                    <div><strong>${lang.name}</strong> - ${lang.percent}%</div>
                    <div><input type="range" min="0" max="100" value="${lang.percent}" onchange="updateLanguagePercent(${i}, this.value)" style="width:150px;"><button class="btn-danger btn-sm ms-2" onclick="deleteLanguage(${i})">Delete</button></div>
                </div>
            `).join('');
        }

        // Render Projects
        function renderProjects() {
            const container = document.getElementById('projectsList');
            if (!portfolioData.projects || portfolioData.projects.length === 0) {
                container.innerHTML = '<p class="text-center">No projects. Click "Add New Project" to create one.</p>';
                return;
            }
            container.innerHTML = portfolioData.projects.map((p, i) => `
                <div class="item-card">
                    <div><strong>${p.title}</strong><br><small>${p.category || 'Uncategorized'} | ${p.tags || ''}</small></div>

        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'application/json';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = async (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        await fetch(`${API_URL}/portfolio`, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'x-auth-token': token }, body: JSON.stringify(data) });
                        showSuccess('Data imported!');
                        loadAllData();
                    } catch (error) {
                        showError('Invalid file');
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

            div.innerHTML = `<i class="fas fa-check-circle"></i> ${msg}`;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }

        function showError(msg) {
            const div = document.createElement('div');
            div.className = 'alert alert-danger';
            div.style.cssText = 'position:fixed;top:20px;right:20px;z-index:9999;padding:12px 20px;background:#f8d7da;color:#721c24;border-radius:8px;';
            div.innerHTML = `<i class="fas fa-exclamation-triangle"></i> ${msg}`;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }

        function getSectionIcon(type) {
            const icons = {
                hero: 'fa-star', about: 'fa-user', languages: 'fa-code', projects: 'fa-project-diagram',
                education: 'fa-graduation-cap', contact: 'fa-envelope', footer: 'fa-copyright'
            };
            return icons[type] || 'fa-edit';
        }

        function logout() {
            sessionStorage.removeItem('adminLoggedIn');
            window.location.href = 'admin-login.html';
        }

        document.getElementById('menuToggle').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('active');
        });

        loadAllData();
    </script>
</body>

</html>
